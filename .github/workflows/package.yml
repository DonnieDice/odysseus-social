name: Package

on:
  pull_request:
  push:
    branches:
      - main
      - ci-package-build-pipeline
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  ARTIFACT_RETENTION_DAYS: 30

jobs:
  python:
    name: Python wheel and sdist
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build Python artifacts
        run: |
          bash scripts/ci/build-package-artifacts.sh
          VERSION=$(awk -F'"' '/^version = / { print $2; exit }' pyproject.toml)
          bash scripts/ci/finalize-artifacts.sh artifacts "python" "$VERSION" "linux" "wheel"

      - name: Read package version
        id: version
        run: awk -F'"' '/^version = / { print "version=" $2; exit }' pyproject.toml >> "$GITHUB_OUTPUT"

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: odysseus-python-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: artifacts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  source:
    name: Git source archive
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build source archive
        run: |
          bash scripts/ci/build-source-dist.sh
          VERSION=$(awk -F'"' '/^version = / { print $2; exit }' pyproject.toml)
          bash scripts/ci/finalize-artifacts.sh artifacts "source" "$VERSION" "linux" "source"

      - name: Read package version
        id: version
        run: awk -F'"' '/^version = / { print "version=" $2; exit }' pyproject.toml >> "$GITHUB_OUTPUT"

      - name: Upload source artifacts
        uses: actions/upload-artifact@v4
        with:
          name: odysseus-source-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: artifacts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write Docker artifact manifest
        run: |
          mkdir -p artifacts
          VERSION=$(awk -F'"' '/^version = / { print $2; exit }' pyproject.toml)
          {
            echo "version=${VERSION}"
            echo "image=${IMAGE_NAME}"
            echo "digest=${{ steps.build.outputs.digest }}"
            echo "tags<<EOF"
            printf '%s\n' "${{ steps.meta.outputs.tags }}"
            echo "EOF"
          } > artifacts/manifest.txt
          bash scripts/ci/finalize-artifacts.sh artifacts "docker" "$VERSION" "linux" "docker"

      - name: Read package version
        id: version
        run: awk -F'"' '/^version = / { print "version=" $2; exit }' pyproject.toml >> "$GITHUB_OUTPUT"

      - name: Upload Docker metadata
        uses: actions/upload-artifact@v4
        with:
          name: odysseus-docker-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: artifacts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  deb:
    name: DEB / ${{ matrix.target }}
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: debian12
            container: debian:12
          - target: debian13
            container: debian:13
          - target: ubuntu2404
            container: ubuntu:24.04
          - target: ubuntu2604
            container: ubuntu:26.04
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y bash ca-certificates git python3 dpkg-dev

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build DEB artifact
        run: |
          bash scripts/ci/build-deb-package.sh "${{ matrix.target }}"
          VERSION=$(awk -F'"' '/^version = / { print $2; exit }' pyproject.toml)
          bash scripts/ci/finalize-artifacts.sh artifacts "deb-${{ matrix.target }}" "$VERSION" "linux" "deb"

      - name: Read package version
        id: version
        run: awk -F'"' '/^version = / { print "version=" $2; exit }' pyproject.toml >> "$GITHUB_OUTPUT"

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: odysseus-deb-${{ matrix.target }}-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: artifacts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  rpm:
    name: RPM / ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: fedora43
            container: fedora:43
            install: dnf --disablerepo='fedora-cisco-openh264' install -y bash ca-certificates git python3 rpm-build systemd-rpm-macros
          - target: fedora44
            container: fedora:44
            install: dnf --disablerepo='fedora-cisco-openh264' install -y bash ca-certificates git python3 rpm-build systemd-rpm-macros
          - target: el10
            container: quay.io/centos/centos:stream10
            install: dnf install -y bash ca-certificates git python3 rpm-build systemd-rpm-macros
          - target: opensuse-tumbleweed
            container: opensuse/tumbleweed:latest
            install: zypper --non-interactive --gpg-auto-import-keys refresh && zypper --non-interactive install bash ca-certificates git python3 rpm-build systemd-rpm-macros
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Pull RPM build container
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            if docker pull "${{ matrix.container }}"; then
              exit 0
            fi
            echo "Container pull failed; retrying in $((i * 10))s..."
            sleep $((i * 10))
          done
          docker pull "${{ matrix.container }}"

      - name: Build RPM artifact
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            "${{ matrix.container }}" \
            sh -lc '${{ matrix.install }} && bash scripts/ci/build-rpm-package.sh "${{ matrix.target }}" && chown -R "$(stat -c "%u:%g" /work)" artifacts'
          VERSION=$(awk -F'"' '/^version = / { print $2; exit }' pyproject.toml)
          bash scripts/ci/finalize-artifacts.sh artifacts "rpm-${{ matrix.target }}" "$VERSION" "linux" "rpm"

      - name: Read package version
        id: version
        run: awk -F'"' '/^version = / { print "version=" $2; exit }' pyproject.toml >> "$GITHUB_OUTPUT"

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: odysseus-rpm-${{ matrix.target }}-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: artifacts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  apk:
    name: APK tarball / ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: alpine320
            container: alpine:3.20
          - target: alpine322
            container: alpine:3.22
          - target: alpine323
            container: alpine:3.23
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build APK-style tarball
        run: |
          docker run --rm -v "$PWD:/work" -w /work "${{ matrix.container }}" \
            sh -lc "apk add --no-cache bash ca-certificates git python3 tar gzip findutils coreutils && bash scripts/ci/build-apk-package.sh '${{ matrix.target }}' && chown -R \"\$(stat -c '%u:%g' /work)\" artifacts"
          VERSION=$(awk -F'"' '/^version = / { print $2; exit }' pyproject.toml)
          bash scripts/ci/finalize-artifacts.sh artifacts "apk-${{ matrix.target }}" "$VERSION" "linux" "apk"

      - name: Read package version
        id: version
        run: awk -F'"' '/^version = / { print "version=" $2; exit }' pyproject.toml >> "$GITHUB_OUTPUT"

      - name: Upload APK-style artifact
        uses: actions/upload-artifact@v4
        with:
          name: odysseus-apk-${{ matrix.target }}-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: artifacts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  aur:
    name: AUR source package
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install build dependencies
        run: pacman -Sy --noconfirm --needed bash ca-certificates git python pacman-contrib

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build AUR metadata
        run: |
          useradd -m builder
          chown -R builder:builder "$PWD"
          su builder -c 'bash scripts/ci/build-aur-package.sh'
          VERSION=$(awk -F'"' '/^version = / { print $2; exit }' pyproject.toml)
          bash scripts/ci/finalize-artifacts.sh artifacts "aur" "$VERSION" "linux" "aur"

      - name: Read package version
        id: version
        run: awk -F'"' '/^version = / { print "version=" $2; exit }' pyproject.toml >> "$GITHUB_OUTPUT"

      - name: Upload AUR artifact
        uses: actions/upload-artifact@v4
        with:
          name: odysseus-aur-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: artifacts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  macos:
    name: macOS standalone
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build macOS DMG with PyInstaller
        run: |
          pyinstaller --clean --noconfirm --onefile --name odysseus --add-data "static:static" --add-data "core:core" --add-data "routes:routes" --add-data "src:src" --add-data "services:services" --add-data "mcp_servers:mcp_servers" --add-data "config:config" --add-data "scripts:scripts" app.py
          mkdir -p artifacts
          rm -rf dmg-root
          mkdir -p dmg-root/Odysseus
          cp dist/odysseus dmg-root/Odysseus/odysseus
          chmod +x dmg-root/Odysseus/odysseus

          # Free runner disk before hdiutil creates the image.
          rm -rf build dist
          python -m pip cache purge || true

          echo "Disk before DMG:"
          df -h .
          echo "DMG source size:"
          du -sh dmg-root/Odysseus

          SRC_MB=$(du -sm dmg-root/Odysseus | awk '{ print $1 }')
          DMG_MB=$((SRC_MB + 512))

          hdiutil create \
            -volname Odysseus \
            -srcfolder dmg-root/Odysseus \
            -ov \
            -format UDZO \
            -fs HFS+ \
            -size "${DMG_MB}m" \
            "artifacts/odysseus-macos-${VERSION}.dmg"

      - name: Finalize artifacts
        run: |
          VERSION=$(awk -F'"' '/^version = / { print $2; exit }' pyproject.toml)
          bash scripts/ci/finalize-artifacts.sh artifacts "macos" "$VERSION" "macos" "dmg"

      - name: Read package version
        id: version
        run: awk -F'"' '/^version = / { print "version=" $2; exit }' pyproject.toml >> "$GITHUB_OUTPUT"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: odysseus-macos-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: artifacts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  windows:
    name: Windows .exe installer
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build Windows .exe with PyInstaller
        run: |
          pyinstaller --onefile --name odysseus --add-data "static;static" --add-data "core;core" --add-data "routes;routes" --add-data "src;src" --add-data "services;services" --add-data "mcp_servers;mcp_servers" --add-data "config;config" --add-data "scripts;scripts" app.py
          $VERSION = (Select-String -Path pyproject.toml -Pattern '^version = "(.*)"').Matches.Groups[1].Value
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item dist/odysseus.exe "artifacts/odysseus-windows-$VERSION.exe"

      - name: Finalize artifacts
        run: |
          VERSION=$(awk -F'"' '/^version = / { print $2; exit }' pyproject.toml)
          bash scripts/ci/finalize-artifacts.sh artifacts "windows" "$VERSION" "windows" "exe"
        shell: bash

      - name: Read package version
        id: version
        run: awk -F'"' '/^version = / { print "version=" $2; exit }' pyproject.toml >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: odysseus-windows-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: artifacts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  release:
    name: GitHub Release artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - python
      - source
      - docker
      - deb
      - rpm
      - apk
      - aur
      - macos
      - windows
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: odysseus-*
          path: release-artifacts

      - name: Prepare release files
        run: |
          mkdir -p release

          # Collect only real package binaries — skip metadata files.
          while IFS= read -r file; do
            name="$(basename "$file")"
            case "$name" in
              SHA256SUMS|manifest.txt|metadata.json) continue ;;
              *) cp "$file" "release/${name}" ;;
            esac
          done < <(find release-artifacts -type f | sort)

          cd release
          sha256sum ./* > SHA256SUMS
          echo "Release artifacts:"
          ls -lah
          cd ..

      - name: Create release notes
        run: |
          VERSION="${TAG#v}"
          DOCKER_MANIFEST="$(find release-artifacts -name 'manifest.txt' -exec grep -l '^image=' {} \; | head -1 || true)"
          DOCKER_REF=""
          if [ -n "$DOCKER_MANIFEST" ]; then
            IMG="$(grep '^image=' "$DOCKER_MANIFEST" | cut -d= -f2- || true)"
            DIGEST="$(grep '^digest=' "$DOCKER_MANIFEST" | cut -d= -f2- || true)"
            [ -n "$IMG" ] && DOCKER_REF="\`${IMG}@${DIGEST}\`"
          fi

          {
            echo "# Odysseus ${TAG}"
            echo ""
            echo "Self-hosted AI workspace — chat, agents, research, documents, memory, email, calendar."
            echo ""
            echo "## Downloads"
            echo ""
            echo "| Platform | File |"
            echo "|----------|------|"
            echo "| Python wheel | \`odysseus_ai_workspace-${VERSION}-py3-none-any.whl\` |"
            echo "| Source (sdist) | \`odysseus-ai-workspace-${VERSION}.tar.gz\` |"
            echo "| Git archive | \`odysseus-${VERSION}.tar.gz\` |"
            [ -n "$DOCKER_REF" ] && echo "| Docker | ${DOCKER_REF} |"
            echo "| macOS | \`odysseus-macos-${VERSION}.dmg\` |"
            echo "| Windows | \`odysseus-windows-${VERSION}.exe\` |"
            echo "| DEB (Debian 12/13, Ubuntu 24.04/26.04) | \`odysseus-ai-workspace_${VERSION}_*.deb\` |"
            echo "| RPM (Fedora 43/44, EL10, openSUSE) | \`odysseus-ai-workspace-${VERSION}-*.rpm\` |"
            echo "| APK (Alpine 3.20/3.22/3.23) | \`odysseus-ai-workspace_${VERSION}_*.apk.tar.gz\` |"
            echo "| AUR | \`PKGBUILD\` |"
            echo ""
            echo "## Checksums"
            echo ""
            echo "SHA256SUMS included with every release."
            echo ""
            echo "## Docker"
            echo ""
            [ -n "$DOCKER_REF" ] && echo "Pull: \`docker pull ${DOCKER_REF}\`" || echo "Image published to GHCR."
          } > RELEASE_NOTES.md
        env:
          TAG: ${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@cfea534fc28a620b6f4e5aceaf93593622e1b791 # v2.2.2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
