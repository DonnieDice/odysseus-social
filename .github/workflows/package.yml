name: Package

on:
  pull_request:
  push:
    branches:
      - main
      - ci-package-build-pipeline
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  ARTIFACT_RETENTION_DAYS: 30

jobs:
  python:
    name: Python wheel and sdist
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build Python artifacts
        run: |
          bash scripts/ci/build-package-artifacts.sh
          VERSION=$(awk -F'"' '/^version = / { print $2; exit }' pyproject.toml)
          bash scripts/ci/finalize-artifacts.sh artifacts "python" "$VERSION" "linux" "wheel"

      - name: Read package version
        id: version
        run: awk -F'"' '/^version = / { print "version=" $2; exit }' pyproject.toml >> "$GITHUB_OUTPUT"

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: odysseus-python-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: artifacts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  source:
    name: Git source archive
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build source archive
        run: |
          bash scripts/ci/build-source-dist.sh
          VERSION=$(awk -F'"' '/^version = / { print $2; exit }' pyproject.toml)
          bash scripts/ci/finalize-artifacts.sh artifacts "source" "$VERSION" "linux" "source"

      - name: Read package version
        id: version
        run: awk -F'"' '/^version = / { print "version=" $2; exit }' pyproject.toml >> "$GITHUB_OUTPUT"

      - name: Upload source artifacts
        uses: actions/upload-artifact@v4
        with:
          name: odysseus-source-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: artifacts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write Docker artifact manifest
        run: |
          mkdir -p artifacts
          VERSION=$(awk -F'"' '/^version = / { print $2; exit }' pyproject.toml)
          {
            echo "version=${VERSION}"
            echo "image=${IMAGE_NAME}"
            echo "digest=${{ steps.build.outputs.digest }}"
            echo "tags<<EOF"
            printf '%s\n' "${{ steps.meta.outputs.tags }}"
            echo "EOF"
          } > artifacts/manifest.txt
          bash scripts/ci/finalize-artifacts.sh artifacts "docker" "$VERSION" "linux" "docker"

      - name: Read package version
        id: version
        run: awk -F'"' '/^version = / { print "version=" $2; exit }' pyproject.toml >> "$GITHUB_OUTPUT"

      - name: Upload Docker metadata
        uses: actions/upload-artifact@v4
        with:
          name: odysseus-docker-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: artifacts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  deb:
    name: DEB / ${{ matrix.target }}
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: debian12
            container: debian:12
          - target: debian13
            container: debian:13
          - target: ubuntu2404
            container: ubuntu:24.04
          - target: ubuntu2604
            container: ubuntu:26.04
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y bash ca-certificates git python3 dpkg-dev

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build DEB artifact
        run: |
          bash scripts/ci/build-deb-package.sh "${{ matrix.target }}"
          VERSION=$(awk -F'"' '/^version = / { print $2; exit }' pyproject.toml)
          bash scripts/ci/finalize-artifacts.sh artifacts "deb-${{ matrix.target }}" "$VERSION" "linux" "deb"

      - name: Read package version
        id: version
        run: awk -F'"' '/^version = / { print "version=" $2; exit }' pyproject.toml >> "$GITHUB_OUTPUT"

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: odysseus-deb-${{ matrix.target }}-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: artifacts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  rpm:
    name: RPM / ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: fedora43
            container: fedora:43
            install: dnf --disablerepo='fedora-cisco-openh264' install -y bash ca-certificates git python3 rpm-build systemd-rpm-macros
          - target: fedora44
            container: fedora:44
            install: dnf --disablerepo='fedora-cisco-openh264' install -y bash ca-certificates git python3 rpm-build systemd-rpm-macros
          - target: el10
            container: quay.io/centos/centos:stream10
            install: dnf install -y bash ca-certificates git python3 rpm-build systemd-rpm-macros
          - target: opensuse-tumbleweed
            container: opensuse/tumbleweed:latest
            install: zypper --non-interactive --gpg-auto-import-keys refresh && zypper --non-interactive install bash ca-certificates git python3 rpm-build systemd-rpm-macros
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Pull RPM build container
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            if docker pull "${{ matrix.container }}"; then
              exit 0
            fi
            echo "Container pull failed; retrying in $((i * 10))s..."
            sleep $((i * 10))
          done
          docker pull "${{ matrix.container }}"

      - name: Build RPM artifact
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            "${{ matrix.container }}" \
            sh -lc '${{ matrix.install }} && bash scripts/ci/build-rpm-package.sh "${{ matrix.target }}" && chown -R "$(stat -c "%u:%g" /work)" artifacts'
          VERSION=$(awk -F'"' '/^version = / { print $2; exit }' pyproject.toml)
          bash scripts/ci/finalize-artifacts.sh artifacts "rpm-${{ matrix.target }}" "$VERSION" "linux" "rpm"

      - name: Read package version
        id: version
        run: awk -F'"' '/^version = / { print "version=" $2; exit }' pyproject.toml >> "$GITHUB_OUTPUT"

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: odysseus-rpm-${{ matrix.target }}-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: artifacts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  apk:
    name: APK tarball / ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: alpine320
            container: alpine:3.20
          - target: alpine322
            container: alpine:3.22
          - target: alpine323
            container: alpine:3.23
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build APK-style tarball
        run: |
          docker run --rm -v "$PWD:/work" -w /work "${{ matrix.container }}" \
            sh -lc "apk add --no-cache bash ca-certificates git python3 tar gzip findutils coreutils && bash scripts/ci/build-apk-package.sh '${{ matrix.target }}' && chown -R \"\$(stat -c '%u:%g' /work)\" artifacts"
          VERSION=$(awk -F'"' '/^version = / { print $2; exit }' pyproject.toml)
          bash scripts/ci/finalize-artifacts.sh artifacts "apk-${{ matrix.target }}" "$VERSION" "linux" "apk"

      - name: Read package version
        id: version
        run: awk -F'"' '/^version = / { print "version=" $2; exit }' pyproject.toml >> "$GITHUB_OUTPUT"

      - name: Upload APK-style artifact
        uses: actions/upload-artifact@v4
        with:
          name: odysseus-apk-${{ matrix.target }}-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: artifacts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  aur:
    name: AUR source package
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install build dependencies
        run: pacman -Sy --noconfirm --needed bash ca-certificates git python pacman-contrib

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build AUR metadata
        run: |
          useradd -m builder
          chown -R builder:builder "$PWD"
          su builder -c 'bash scripts/ci/build-aur-package.sh'
          VERSION=$(awk -F'"' '/^version = / { print $2; exit }' pyproject.toml)
          bash scripts/ci/finalize-artifacts.sh artifacts "aur" "$VERSION" "linux" "aur"

      - name: Read package version
        id: version
        run: awk -F'"' '/^version = / { print "version=" $2; exit }' pyproject.toml >> "$GITHUB_OUTPUT"

      - name: Upload AUR artifact
        uses: actions/upload-artifact@v4
        with:
          name: odysseus-aur-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: artifacts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  macos:
    name: macOS standalone
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Free runner disk space
        run: |
          sudo rm -rf /Library/Developer/CoreSimulator /opt/hostedtoolcache/CodeQL /usr/local/lib/android /usr/share/dotnet

      - name: Build macOS DMG with PyInstaller
        run: |
          pyinstaller --onefile --name odysseus --add-data "static:static" --add-data "core:core" --add-data "routes:routes" --add-data "src:src" --add-data "services:services" --add-data "mcp_servers:mcp_servers" --add-data "config:config" --add-data "scripts:scripts" app.py
          mkdir -p artifacts
          rm -rf dmg-root
          mkdir -p dmg-root/Odysseus
          cp dist/odysseus dmg-root/Odysseus/odysseus
          chmod +x dmg-root/Odysseus/odysseus
          hdiutil create -volname Odysseus -srcfolder dmg-root/Odysseus -ov -format UDZO "artifacts/odysseus-macos-${{ github.sha }}.dmg"

      - name: Finalize artifacts
        run: |
          VERSION=$(awk -F'"' '/^version = / { print $2; exit }' pyproject.toml)
          bash scripts/ci/finalize-artifacts.sh artifacts "macos" "$VERSION" "macos" "dmg"

      - name: Read package version
        id: version
        run: awk -F'"' '/^version = / { print "version=" $2; exit }' pyproject.toml >> "$GITHUB_OUTPUT"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: odysseus-macos-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: artifacts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  windows:
    name: Windows .exe installer
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build Windows .exe with PyInstaller
        run: |
          pyinstaller --onefile --name odysseus --add-data "static;static" --add-data "core;core" --add-data "routes;routes" --add-data "src;src" --add-data "services;services" --add-data "mcp_servers;mcp_servers" --add-data "config;config" --add-data "scripts;scripts" app.py
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item dist/odysseus.exe "artifacts/odysseus-windows-${{ github.sha }}.exe"

      - name: Finalize artifacts
        run: |
          VERSION=$(awk -F'"' '/^version = / { print $2; exit }' pyproject.toml)
          bash scripts/ci/finalize-artifacts.sh artifacts "windows" "$VERSION" "windows" "exe"
        shell: bash

      - name: Read package version
        id: version
        run: awk -F'"' '/^version = / { print "version=" $2; exit }' pyproject.toml >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: odysseus-windows-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: artifacts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  release:
    name: GitHub Release artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - python
      - source
      - docker
      - deb
      - rpm
      - apk
      - aur
      - macos
      - windows
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: odysseus-*
          path: release-artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p release-files
          while IFS= read -r file; do
            artifact="$(basename "$(dirname "$file")")"
            name="$(basename "$file")"
            case "$name" in
              manifest.txt|SHA256SUMS)
                cp "$file" "release-files/${artifact}-${name}"
                ;;
              *)
                cp "$file" "release-files/${name}"
                ;;
            esac
          done < <(find release-artifacts -type f | sort)
          find release-files -type f | sort
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Odysseus ${TAG}" \
            --notes "Versioned Odysseus package artifacts built by GitHub Actions. External AUR/Snap/Flatpak publishing is intentionally maintainer-owned follow-up work."
          find release-files -type f -size +0c -print0 | xargs -0 -r -I{} gh release upload "$TAG" "{}" --repo "$GITHUB_REPOSITORY" --clobber
