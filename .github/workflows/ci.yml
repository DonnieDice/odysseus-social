name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - ci-package-build-pipeline
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression-guards:
    name: Regression guards
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run repository regression guards
        run: bash scripts/ci/check-regressions.sh

  unit-tests:
    name: Unit tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest -q scripts/tests/ --junitxml=test-results.xml

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: pytest-py${{ matrix.python-version }}
          path: test-results.xml
          reporter: java-junit
          fail-on-error: false

  dependency-smoke:
    name: Dependency smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Check installed dependencies
        run: python -m pip check
